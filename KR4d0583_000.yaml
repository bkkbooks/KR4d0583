body:
  text: 提要别集類四元樗隠集六巻臣等謹案樗隠集六巻元胡行簡撰行簡字居敬新喻人至正二年進士授國子監助教歴翰林修撰除江南道御史遷江西亷訪司經歴遭世亂乞歸以經學教授鄉里事蹟見江西通志中考明史禮志載洪武二年詔郡縣舉髙潔博雅之士同修禮書至者八人而行簡與焉是明初尚存故集中晏公廟喻真人二碑俱有洪武年號然明太祖實録又載徵江西儒士劉于胡行簡等至京欲官之俱以老病辭各賜帛遣還則未嘗受明官也行簡文章以冲和雅澹為宗雖波瀾未濶而能確守法度不為支離冗贅之詞擬之元末殆李祁雲陽集之流其詩傳者無多墨竹一章於故君舊國之思再三致意亦頗可見其節操焦竑經籍志所列元末明初諸集為數最夥而獨無此集之目是明代傳本已尠今從永樂大典蒐輯編綴釐為六巻存其概焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:312f565d35e0b48081f6420167dd530b0cc87e90b520bd788cd4e1d8e7811c11
