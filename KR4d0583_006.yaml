body:
  text: 樗隱集卷六元胡行簡撰銘讀易齊銘東原為文獻之邦名卿碩儒代産其地往嘗校藝秋闈士子試於有司殆七百有餘鐫額所取才二十人耳穆螢德敬其一也德敬名其齊讀易徴為之銘銘曰混沌未分易道已具混沌既分易道斯著肇自上古庖犧挺生八卦將畫馬圖斯呈人文昭宣聖人代作易書大備施及濓洛更互演繹理象昭明大易之道粲如日星嗟世之人咸知有易卜筮斯尚孰能探賾猗歟穆螢刻志窮經動靜語默惟易是徴吾心之微參乎造化易具諸心匪由外借理象事物一本萬殊體之吾心驗之易書在昔𤣥聖韋編三絶勉旃力行庶幾有得藝閣銘豐城胡仲恭建閣庋書題其顔曰藝閣書香徴為之銘銘曰豐西胡氏藏書有閣經史子集萬卷參錯藏書孔多何以辟蠧爰采香藝密置防護積而能讀如日之東循序而進日行太空猗維仲恭士林之英閉門卻掃矻矻窮經聖賢事業布在方䇿致知力行是效是則積而不讀與無書同孰云糟粕道在其中我述斯銘匪為誇美爰集格言朂爾孫子題跋題江山萬里圖後天下之山莫髙於西北天下之水莫盛於東南禹貢九州其廣輪所及東南西北相距各萬里俱可考見惟鄒衍言九州外更有大九州事非經見不可臆知也清江某示余江山萬里圗能賦者多工為詩文形容其美余竊惟某之寫是圗蓋欲觀山川之源委究脉絡之㑹通以進德修業非特資覽玩娛心志而已山川皆始於徼外而達於中夏禹貢言𨗳山其事有五言𨗳水凡九而水之最大者江也河也山之巍然髙且大峙乎四極者支分條析悉可知矣今以江之發乎岷山者觀之可以論為學之事岷江之東注也歷白鹽過赤甲層崖峭壁撗亘乎左右瞿塘灧澦齟齬乎中流拂其順流之性而激之以橫潰者比比皆是也然朝宗之勢孰能沮之哉出巫峽下夷陵則滔滔而流達於海矣君子之于學也蓋猶是耳始之為學扞格而難入猶江之縈乎崖石也中焉有得猶江之并納百川漸至廣大也終之所至浩浩蕩蕩邈乎不知其所始茫乎莫測其所終猶江之合乎巨海渾淪無間也觀乎水斯可進德況觀之長江萬里乎宜諸君子觀是圗喜而詠歌之也某年方強仕篤志有為措諸事業如山之髙如川之方至尚於斯圗有取焉跋蘭亭帖右軍蘭亭世之善書者臨寫最多惟吳興獨得其真觀蘭亭所藏此卷筆意流動疑吳興寫時必有神助也嘗觀吳興蘭亭跋語其所見墨本無有同者則刻者互有得失也右軍初本後唐摹勒於石契丹滅石晉以氊罽褁之而北契丹主殂軍士爭取玉帛此石流落民間為孫學究所得後宋景文公復購得之即今所謂定武本也近世吳副樞之孫以此石歸之御史大夫額森特穆爾其家廢不知又流落何處但此帖乃世間至寶當必有神物呵護之他日出為世用與汾隂寶鼎同為瑞物也題袁叔正學士鹵簿儀後竊觀前代帝王勳業之盛非得公卿大夫士作為文章以發揚潤色則其事雖載之史冊終不能膾炙人口以表著天下後世周宣王石鼓尚矣漢唐之君功烈雖陋而至今炳炳烺烺耀人耳目者以司馬相如揚雄栁子厚韓昌黎之流為之鋪張而極其聲容之盛也我國家混一海宇治底隆平英宗皇帝承重熙纍洽之餘肇修鹵簿人物儀衛之盛蔚然為一代偉觀沛國袁叔正氏紀之歌詠使太平盛典與雅頌相為悠久漢唐不足倫矣碑清江鎮晏公祠廟碑清江鎮舊有晏公廟厯世滋久莫之改作謁而祀者見其隘且陋欲撤而新之不果洪武甲子里人彭士寬慨然曰神食于斯永福我民而廟貌不足揭䖍妥靈非缺典歟凡徼福者聞其言或助之金或輸之粟以相其役乃度地於寶金山之側建殿庭立門廡規模位置增其舊數倍既逾年弗克就郡守錢恕還自京師過而嘆曰獨力之難成也如此乃捐俸以為之倡於是鄉邑官吏咸相率鳩資以相其成不待勸而能也逺近之見者聞者爭效其力逾數月竣事里父老士庶擊牲釃酒告成功於神咸願勒石以紀成績前守以屬豫因次第記其說以為之文按郡乘鎮之地故金陽縣也山川英淑之氣代産異人以廟食於斯聶公友喻公法先是也公生乎是鎮與二公匹休祠而祭之亦宜也稽諸禮經能為民禦災捍患則列之於祀公之威靈始乎鄉里著於江右南至湖湘東暨京口以至川峽河海莫不仰其英風欽其肸蠁上自朝廷下逮士庶舟楫之行材木庶物之運卒遇風濤之險往往叫號神明其免于危難之餘而措之坦夷之際易危而安如履平地祠宇所在曄然相望矧公桑梓之鄉可弗加之意乎禮莫大于報本不於祠祀致恭不可也公生有異質善事父母人稱其孝生為孝子歿為明神故宜默扶世道與天地相為悠久也若其始生其卒葬年月勒之碑隂兹不續為之書乃為之銘銘曰鹿渚之濵江山勝處葛峰南來蕭水東注挺竒育秀猗地之靈篤生異人為時之楨濟物以慈事親以孝為己為人克全其道生為孝子歿為明神功在國家澤在斯民河海湖江惟神所職舟楫無虞咸戴神力禦災捍患崇德報功神溥其惠人效其功寶金之山新宫所在桑梓之邦萬世攸賴神靈有赫廟貌斯䖍護國利民永矢弗愆重建喻公真人溥濟廟碑太極判鰲極立峙而為山流而為水其山水回合之處必有神主之郡城東三十里有芳洲曰中勝前俯大江後枕溪流葛峯屹其東蒙嶺矗其西湄湘玉峽襟帶其南豐水錦江綿亘其北互相映帶而洲居其中若翠水環蓬島英華清淑之氣挺生人傑不為烈士則為明神若太尉陶公侃真人喻公法先生于斯居於斯太尉之先鄱人而隨母湛氏長於是皆為鄉邦之光與山川相為悠久也真人生而聰頴篤孝于親潜心造化思與神明居富商巨賈舟楫往來即真人問休咎敏發捷中如響之應聲莫不懸合郡縣上供之物運輸京師公私懋遷之貨經涉湖江猝遇風濤之險致禱於真人即拔之顛沛之中措之安全之地威靈烜赫四方之聞見者無敢不敬也臨郡以其事白之於省憲轉以上聞制封公為神功溥惠真人廟額曰中勝洲溥濟廟敕翰林學士承㫖程巨夫文其事於石樓臺殿閣棟宇翬飛穹碑雄文光采煥發蔚為江右偉觀遐邇所共瞻也嵗壬辰悉燬於兵舉目惟荆榛瓦礫過者莫不䀌傷郡人爰募衆力建數楹奉真人香火為庶民乞靈之所至大明洪武十有五年里之耆德膺衆請典供祠事遂畚瓦礫闢荆榛重建水府龍君之殿真人之宫致敬之庭暨分祀之祠以次第成規模位置悉復其舊里老父嘖嘖稱嘆咸曰新廟翼翼雖神靈所致興造嵗月不可泯也宜勒之貞珉以彰神之丕績乃相率徴為之文余惟望于山川遍於羣神有虞猶然宜厯代敬共神明也稽之於禮凡為民禦災捍患必崇祀以報北暨河淮南連荆益吳檣楚柂咸宥庇燾而神霄督府晏公代天宣化靈應昭著又真人之髙第弟子也崇德報功咸載祀典嚴廟貌于所生之鄉俾人知水木本源之意宜也真人生于宋開禧甲子三月至元景定壬戌二月端坐而化子仲昭有道術人信嚮之真人孫曰權曰衡咸克世其家洪武七年朝廷聞神之靈跡遣使致祭恩寵隆厚與廟俱新吁盛矣銘曰大江之西兮豫章上游仙水孕秀兮中勝之洲地既靈兮神所都護國庇民兮揚天休神依人兮人依神安厥止兮將奚求民戴神兮為其司命神祐民兮降福孔遒廟貌再嚴兮祀事修雲風帆檣兮百無憂神之出入兮龍為輈水不揚波兮安流歸安斯廟兮綏我民瑤圖同久兮萬嵗千秋傳廖節婦傳婦姓陳氏淦之仁和里人也幼聰敏嗜書史姆教以五七言詩輒能成誦所受書過目不忘每讀列女傳慨然想其為人處父母之側昆弟姊妹之間未嘗有過恪守女則宗姻亟稱其賢甫及笄擇所宜歸咸曰此賢女也必得壻之佳者為之配廖氏世姻也家豐而子且才遂歸之相夫子以順事舅姑以敬動無過舉舅姑歿喪葬合宜踰數嵗夫以疾終志欲從死勉之者曰撫遺孤以承宗祀義至重也舍生而不合乎義奚取焉遂弗果服除有欲奪其志者仰天嘆曰山可移河可塞吾志不可奪也遂篤訓子期亢而宗嵗時伏臘奉祖禰睦姻族豐儉適宜曲盡禮意閨門肅穆庭無間言凛然自持皎如氷雪深可嘉也前史氏曰虞周盛時教明於上俗美於下婦人女子咸有貞信行春秋戰國守節自誓者昉見於載籍世教衰而後節義之名立豈不信歟歐陽子大書斷臂之事以愧長樂老益足傷矣陳氏女之廖氏也兵燹方寧家業凋墜處乎艱危之中而秉心不渝卓然有烈丈夫之風視世之以利害為心臨艱而易操者蓋亦可感也已墓志銘元故朱公墓志銘人才之生於斯世必為邦家之用然國之取士非一途士之效用非一藝皆可以立功立事黼黻皇猷漢張釋之司馬相如卜式之儔皆以資入仕其事業照耀簡䇿使自立得位以行其志固不出三君子下必有可傳於世者豈止如是而已公諱升字自立姓朱氏世居豐城之西航川先世以儒起家祖申甫宋太學齊諭父明道承務郎瑞州路蒙山𣙜銀提舉公生而聰敏甫數嵗從師學所讀書輒能背誦稍長入郡庠江右儒學李公建心時為教授一見竒之天厯庚午河淮以南大飢詔募民入粟拜官有差公首應詔擢南康縣尉盜肅民安監常德府稅課增於舊擢江州路司獄廣平秦公裕之時為太守亷能自持待僚屬以嚴而有加禮府中事與公商議條令合宜秦公甚敬之未幾丁外艱喪葬悉從禮制服闋擢登仕郎監南昌之石馬稅地當要衝商賈輻輳增於舊十倍前之司征者收羡餘悉歸私帑公悉還之官一毫無所私改監常之宜興稅浙最富庶蒞事一如石馬時升兩浙都轉運使監常司令階從事郎將趣裝之官而潢池之釁起矣公事親孝律已亷處宗族以和交朋友以信凡承上接下雖不妄與之交而謙恭和懌亦未嘗失色於人延師教子皆名進士若邑李亷行簡朱倬孟章學官鄒連平仲禮意濃厚久而彌敬是以階庭子弟彬彬尚文義方之效彰彰在人耳世家大族足以為法焉公生於至元二十五年戊子至正十四年甲午六月二十一日以疾卒得年六十有七娶李氏丁氏黃氏皆大族長子光孚瑞州路髙安縣丞次德孚孫男六人公輅公輔公軾公衡公輦公輗孫女四人長順正適熊景略次適廖禎次適漆固次順柔適熊齒曾孫男十四人桂孫𤣥生以常正常熙孫璧孫申生富生鍾孫惠生澄孫菊生權孫祖保曽孫女九人嵗甲辰二月十三日卜兆於南岸之原銘曰生長升平游宦升平福祿攸同夀考且寧生為良吏歿為良臣社未見屋蔚為全人噫公之位未及顯才未及施周旋郡邑管庫之餘已知其有猷有為髙風令聞固將傳之永世而綿綿福澤尚霑溉乎來裔也前奉訓大夫行御史臺監察御史胡行簡撰行狀水溪鎮巡檢趙公行狀公諱嗣椿字思齊故宋安僖王之裔世居開封府之浚儀逺祖某宦遊江西遂居豐城再遷臨江之清江鎮髙祖望之朝列大夫刑部尚書兼江西提刑觀察節度使封浚儀公娶魏氏封浚儀郡夫人曾祖鈁夫十二齊諭早世娶何氏守節自誓宋旌表其門封貞節宗婦夫人奉敕葬於本鎮龍溪之原祖時彥授儒林郎修文館學士代祀南嶽號秋碧先生娶王氏封宜人父若原授承直郎淮西道營田司提舉性慕善好施與集賢院號清隱先生娶皮氏公幼失怙恃卓然有立志敏於為學辛勤起家內睦族姻外交朋友咸中禮節其居家以延師訓子為務處乎鄉里恆勸其以和順為先為人解紛排難人咸服其公心海宇熙洽當道貴人交為之薦初授湖廣水溪鎮巡檢秩滿還家不樂仕進遂遨遊於江湖間以適已志壬辰嵗鄉民弄兵家業析蕩遂徙居南昌上柴巷甲午嵗十月朔以疾終於正寢公生於元貞丙寅得年五十九娶胡氏子男三人長古訓娶聶氏張氏次男幼男皆歿於兵亂之間孫男四人長驥德次晏弟次晏孫幼愚孫惟公故國世臣之家前翰林子昂趙公皆族序也值文恬武嬉之際使攄其素藴周旋祼將之列何官不可為乃小試徼巡翩然歸隱放浪江湖間無所齟齬於世所謂在彼無惡在此無射者庶乎近之矣潢池弄兵賫志以歿悲夫兒為王臣從事藩閫親存祿弗及養親歿斂勿及視葬不克備禮則重可悲已僕與古訓有通家之好因次第其事以乞銘於當世立言君子尚矜其志而文之當不忘顯揚之盛德也樗隱集卷六
