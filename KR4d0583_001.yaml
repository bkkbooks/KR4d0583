body:
  text: 樗穩集卷一元胡行簡撰樂府秋泉詞為方憲掾賦山空兮欲秋泉聲兮瀏瀏濯吾纓兮光可以鑑洗吾耳兮若將奚求出友䕫龍兮歸侣巢由桂為蓋兮蘭為輈挹兹泉以自潔兮紛來往兮巖幽噫泉可飲兮秋不可汙空山無人兮吾將誰徒五言古詩題憲司鄒宗文山中野人卷達士慕肥遁結廬南山麓朝隨猿鶴遊暮共麋鹿宿松風入琴清蘿月照樽緑高情抗層霄文采振流俗嗟余縶塵纓喜君騁遐躅遙睇孤飛雲白駒渺空谷題篤御史所藏閻立本水磨圖混沌昔初闢𤣥黃奠兩儀大化自摩蕩萬古常如兹往聖大有作妙斡天地機觀象斯製器飲食恆所資雙輪硺山石激水相推移陰陽分動靜元樞繫坤維神功邈不測畫手能傳之繡斧下霄漢披圖慰所思願言運亭􅧆庶拯斯民飢送郭文達之溧水迢迢秦淮水泛泛木蘭舟五馬倦馳驅言遡滄江流新雨滌煩燠東風扇和柔埀柳拂征斾飛花明綺裘覽此情景會因之騁竒遊祖帳盛才彥前驅列鳴騶蘆筍既入饌鰣魚亦堪羞苦無一杯酒相送結綢繆空忝同鄉契離悰入新愁永言厲貞操庶慰心悠悠七言古詩過錢清壩和達內翰題一錢太守祠漢家太守賢且明三年作吏徹底清詔書徵入九卿署山陰父老方知名百錢相送顔為泚去思無限情如水殷勤為爾受一錢猶恐後來貪濁起秖今干戈紛滿處乘時射利忘逺慮我瞻廟貌心孔悲揚舲又逐寒潮去墨竹歌為竹山黃尚英題墨竹相傳肇何世師承疑出有吳氏湖州彭城相接武筆精墨妙照四裔黃君結屋依竹山萬竿如玉森回環平居祇與竹為友琴書俎豆娛其間頻年挾䇿清江涘慨想故山勞夢寐手拈生紙寫叢篁落筆雲煙藹蒼翠圖成銜袖每自擕時時舒卷慰遐思永言瞻菉修厥德臨風長咏淇澳詩臨清歌二首臨清閘頭春雨餘家家門前泥濺裾呼兒汲水自朝暮健卒荷戈喧里閭濮上遺風古來賤鬻兒賣女何顔面衛水多情向北流百折回環不相見五言律詩寄羅東高每懷三竹徑來訪百花原吟策登臨倦塵纓應接繁山圍仙子宅地接野人村肥遁多佳趣何如獨樂園題匡山中竹深處築亭臨别墅繞屋種琅玕地隔紅塵逺窗涵翠色寒穿雲分席坐見月引杯看何日驅車宿相從共倚闌泊湖口用伍大尹韻憶談運幕昆仲亂山環小邑訪友憶曽臨臺榭荒榛合􅉌園宿草深流風頻入夢往事足傷心湖海交游盡遺書杳莫尋南山隱居聞說南山下高人有隱居兒堪了官事我自讀儒書俯檻泉流急鉤簾樹影踈不知塵世內此樂竟何如送吳僧南還遊方經歲久振錫遽南還欲逐帆檣去私愁道路艱秦邦兵尚動官澗水猶慳若待鱸魚美秋風好看山送合流月庭朗上人寶界諸天近依乘雨露多埀衣瞻黼扆承詔講楞伽洗鉢黃龍現傳經白馬駝緑楊江上寺嫋嫋望恩波華上人還蟠龍省師飛錫隨雲逺飄然去就輕山林師友誼江海故人情欲論禪宗事空慙吏隱名歸尋泉石約相待濯塵纓題張希孟中丞山莊得志功成早林泉味更長引身思勇退與世貴相忘蘭長秋紉佩荷深曉製裳白雲如有約常共宿山莊題看竹軒愛竹因成癖相看獨此君捲簾消永日倚檻弄寒雲月影杯中見秋聲枕上聞歲寒心思在瀟灑自超羣送友人之任落落循良守文華振士林郡連平野闊城俯濁河深戀闕丹心在憂民白髮侵甘棠應種滿蔽芾藹春陰七言律詩和劉楚竒韻題張飛卿書房流水環城樹幾株誰家市隱有幽居春聯綺席千鍾酒夜擁銀燈一卷書花影搖窗消野馬柳陰夾岸蔭游魚向來湖海心逾壯軒冕無求樂有餘題楊伯禎詠歸齊不羡乘槎訪斗牛辛勤結屋傍溪頭褰裳秀攬芙蓉渚紉佩香分杜若洲欲慕聖賢尋樂處還從童冠襲風流詠歸觸物思何極胸次應同造化游題許克敬先生得畫竹兩幅名之曰友竹軒索居長恨久離羣圖畫相看有此君霜節慣從冬後見秋聲疑向夜深聞緗文照壁浮晴霧黛色當軒起暮雲京國題詩空悵望江南烟雨翠繽紛寄題錢塘張惟達僉憲藏書閣高閣崢嶸倚碧岑興來隨處漫登臨潮生潮落陰陽理窗暗窗明造化心載籍流傳從往古讀書經濟在斯今何時散䇿胥山上共把遺編坐緑陰采石李謫仙墳次余復興韻脫鞾飛燕偶成讐機事相忘異海鷗知己舊來懷賀監學仙何處覓丹􅉌沈香亭北名花老采石江寒草木秋舉酒酬君招不得落紅滿地緑陰稠左蠡阻風龍祠巍鎮石崔嵬水樂尋常似殷雷風勢欲吹沙礫淨濤聲似挾海潮來江從彭澤孤山合境界匡廬左蠡開直欲揚帆歸故里題詩先到豫章臺舟次彭蠡贈别同歸雪山和尚淦水迢迢隔片雲京華邂逅却相親哦詩共對西山雪把酒曾看上苑春湖海烟波千里闊林泉風月四時新到家還憶同舟樂時寫鸞箋寄故人重簡虞省郎兼寄劉仲修昆仲賔鴻遙度塞雲高交友無書思轉勞總愛還鄉辭魏闕翻令避地託林臯紫薇春靜曽分幕白紵秋深未製袍最喜劉郎能好客何時對菊泛香醪贈張彥文省兄而回兼簡尊府梅翁章水迢迢客路難高堂日望報平安大兒未遂鯨珍養難弟堪供菽水歡霄漢風高鵰鶚逺江湖歲晚鶺鴒寒椒盤獻頌將春酒惟有梅花耐久看贈黃進士上禮部清江自昔號名邦炳炳前修史冊光昭代將興周禮樂大科今得漢賢良九天宫闕星辰近萬里山河道路長三月都門楊柳發臚傳遲子接鵷行次李監倉韻江草微微緑又生東風吹暖過新正閒因物理推消長靜閲光陰任晦明北闕上書勞舊夢中流擊楫想遐征謫仙詩法埀千載喜見聞孫句有情玉笥道中懷袁鍊師月舫憶侍先君謁洞天至今猶記舊山川蒼龍出洞寒雲合白鶴歸巢夜月圓甲士連營門列㦸羽人避地竈沈烟貞元會合回嘉運稽首雲中望列仙題封溪黎仲綽池上亭城市山林境自殊喜看新築小茅廬延賔每對尊前酒訓子長翻架上書喬木千章環舊墅新篁萬箇護幽居結亭更欲依池水何日登臨得共漁七言絶句曾令尹魯山之祖與危太朴之祖聮第且存其往來書翰太朴題其上魯山徵同賦前輩交遊道義真猶從翰墨見情親兩家世澤流芳逺奕葉聞孫事業新江山秋色圖連山縹眇樹槎牙江上西風鴈影斜萬疉秋光無限好畫圖偏在野人家平步青霄圖縹眇扶桑曉日紅千山雲氣自重重東風穩借扶搖力直上蓬萊第一宫題扇與黃志仁鮫綃分自水晶宫團扇裁成璧月同九夏南州煩暑息滿天清意布仁風墨竹帝子浮湘羽葆飛虛心長望翠華歸天寒袖薄空惆悵自剪衡雲學製衣送吳如吾之四川詩滿奚囊酒滿壺春風隨客到成都千巖雲淨花如錦醉倚斜陽聽鷓鴣和張自行過城南作畫飛仙夜覲玉清家曲按霓裳月未斜宴罷歸來香滿袖不知清夢繞梅花思鄉遙憶江南未得歸私心日夜望庭闈青山一髮渾如許不識白雲何處飛徐孺子下榻圖漢家太守好尊賢一榻清高萬古傳莫嘆世無徐孺子陳蕃不遇最堪憐青山白雲圖憶從扈從過居庸北望迢迢萬玉峯獨恨崑崙猶未識至今長被白雲封竹梅圖姑射山頭綽約妃欲搴翡翠製荷衣夜深恐被湘娥妬先拾瓊瑰踏月歸題歐陽氏夀康卷後八十年高矍鑠翁龎眉鶴髮照東風丹臺久占神仙籍王母桃花幾度紅題張宗翰梅林書屋花魁叢裏結茅廬細嚼寒芳助讀書他日廟廊充大用調羮滋味意何如樗隱集卷一
