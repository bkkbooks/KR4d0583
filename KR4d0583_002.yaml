body:
  text: 樗隱集卷二元胡行簡撰記將作院題名記將作院掾史野克惠奉其院長之命持舊牒來請曰將作之為院久官於是者亦多矣而題名尚未立石此其沿革故實也幸次第以為之記豫惟少昊氏命五雉為五工正虞周之共工考工皆將作之任也秦始置將作少府後或更少府曰大匠曰寺曰監名雖不同其實則一而已我國家因前代舊制既設工部又設將作院凡土木營繕之役悉𨽻工部金玉珍寶服玩器幣其治以供御者專領之將作院是寵遇為至近而其職任視工部尤貴且重也夫周官冡宰統職幣玉府以聽天子及后世子之用則國初命官之始以大司徒專董治將作實三代遺意也公卿大夫士繼膺隆寄可不體設官初意而恪共其事歟院初設階從一品繼改從二品隨升正二品院使二員纍增為六員經厯一員都事一員後增二員又增同知三員僉院三員同僉二員院判二員照磨兼管勾一員屬吏增減舊無常額今定為十有四人官則悉書其爵里姓字升改嵗月吏則附見於下方兵部譯史房題名記國家混一海宇日月所照悉為臣妾凡政令之敷朝貢之入不問海內外馳一乘傳則無逺弗達然使介雜遝凌轢郵傳凡給驛符契不總之兵部謹其約束驗其合否曷繇使姦偽不萌而使命無壅歟兵部設譯史十員職專給驛自臺省貴臣下至一介行李但給傳出入文書行必使譯史以國字書之俗號别里歌别里歌者陰寓範防之意也治事之所題曰蒙古房嵗久漸圮譯史某與其同志重經營之墻壁窗戶之汚壞者茵褥几席之故弊者皆葺治而加整飭焉外為周垣傍植花竹儼然稱所觀瞻非求侈乎前人也既成屬豫記其事豫惟周禮六官分職其屬各有史漢丞相屬有掾史雖任有輕重咸執事以奉其上也今幅員既廣諸國人仕乎中外者言語不通國各有字俗既不同難以相一凡官府必設譯史以通語言辨文字惟兵部史專督海宇內外郵傳選任為甚重居是職者階而為卿為相班班可考因次第而悉書之以見國家用人之道蓋各有所重云臨江廣夀寺記臨江舊蕭洲後為蕭灘鎮地以蕭名相傳自蕭梁始宋淳化間置郡郡既成城郭井邑官署民居儒釋老氏之宫鬱乎相望廣夀寺不知始何年代或謂其地乃蕭梁之馬妃祠因以為寺蓋數百年矣寺近闤闠間貨殖之家樂崇其教宋咸淳癸酉住持僧孤山德如募監稅胡成忠撥田十餘畝元皇慶壬子住持僧無影妙月募縣尉彭存耕施田二十餘畝九都之小臯山石灰步則寺之祖塔基所在寺僧圓寂者之葬處也寺基舊在郡治東壬辰燬於兵僧惟德號雲峯建小屋以奉香火安徒衆方欲有所營繕會郡邑長吏承詔即郡治東建分憲之署割城南淨土寺廢址易之雲峯率其徒剃荆榛畚瓦礫櫛風沐雨不以為勞夙夜孜孜思復其舊積數年殿堂門廡皆以次成佛菩薩天人之象幡幢香火之供莫不畢備𢎞偉壯麗有加於昔見者咸嘆其盛吁兵變以來通都大邑道宫佛剎悉化丘墟草莽厯年雖久能復舊觀者蓋鮮或廢而莫興興而莫之完者比比皆是惟雲峯竭心勞力成兹偉觀非力量之大不能也是役也協志以底於成曰慶瑞字雪庭曰如顯字心印效勞而相成者曰普圓曰福應曰永夀皆可紀乃為之銘曰翼翼梵宫倚乎郡城山川環合鍾地之靈統宗據會曰大雄氏攬秀發竒成此巨麗丹楹刻桷畫棟雕梁如翬斯飛有煥其光昔否而燬今泰而治世道攸寧有隆有替崇大功果惟大力量仰止雲峯我心孔臧惟佛之教門開不二惟師之道演佛之祕佛常如日煥乎中天皇圖同久億萬斯年節孝堂記郡庠弟子員宋大寧甫數歲失怙母陳氏教育之以至成人迄今三十餘年相歡如一日構堂所居之第為奉親之所山水清麗互為輝映矗乎其東者曹王之嶺屹乎其西者相公之嶺其南則龍頭山北則有福相嶺皆挺竒獻秀如拱如揖而襟帶斯堂也親之起居遊息家人之昏定晨省皆居而安之嵗時令節會宗黨於斯燕賓遊於斯奉觴以為親夀僉曰母以節顯兒以孝聞冝名斯堂曰節孝以徵永久大寧從余學攻春秋余嘉其事親孝交朋友以信篤學尚義卓然有守非有賢母不能有此令子也陳氏世儒家父海心先生兄愚亭昆季十人皆以文學名故未嫁而習聞詩禮之訓既嫁而相夫有道夫殁以死自誓篤於教子嘗語大寧曰宋氏仕與學代不乏人汝父自立志欲掇科以繩祖武不幸早世汝能力學以不墜先業吾見汝父於地可無愧矣大寧泣聽不忘家貧悉力婦事以供束修費大寧既成立其養母之心亦無所不至母嘗感疾大寧心動亟歸侍湯藥伺愈而後還學必戒其家人曰汝事吾母猶吾在家時稍有不謹不汝貸也母之心常念乎子而子斯須不忘乎母也吁婦之從夫終身不改子之於親終身而慕古昔盛時為人子為人婦莫不各盡其道逮共薑以守義稱閔子以孝行著孝子節婦之名立矣大寧母子蓋聞其風而興也世之人倘聞宋氏之風興孝立節彛倫其有不敘風俗其有不厚乎登其堂者可以油然而興思矣富春堂記清江嚴氏茂淵偕其弟茂芳謁余而言曰家君作堂奉親題曰富春欲求搢紳歌詠其事幸為文以倡之余辭不獲錢邑令文煥復以為言夫富春介於浙水之間嚴子陵所隱之地也其山川之美尚可想見而子陵制行之髙具諸信史凡為士者莫不仰其遺風矧得姓受氏同源分流而水木本原曽不之思乎宜名堂之意取乎是也士生斯世立身行已出與處而已處乎家庭則孝於親友於兄弟吾職之當為也出而任人家國事推是道以見諸用耳嚴氏家庭積慶綿延閲歷四世登斯堂也綵衣婉娩樽俎從容兒拜於前孫拜於後夀觴迭舉慈顔以和一門之內怡怡如也愈愈如也天倫之樂孰有加於此乎斯堂葛峰屹其前蕭水經其左山輝川媚互相映帶雖未能嫓美富春之山亦足悅親心也矧豪傑之士刻志功業必曰我方富於春秋何患其不成則富春者嵗月悠長之謂也慈親康強椿齡方永奉親之樂不減老萊子也名堂之義其善矣乎清時暇日當從文煥往升斯堂奉觴為夀共論子陵隱居之樂以頌其世美庶不負名堂之意茂淵之尊公字定和居鄰邑庠是以能篤意義方云道玄齋記清江楊氏世為良醫師士大夫咸宗尚之至於道玄不知其幾世矣道玄擅醫名於時尤好儒術闢丈室聚軒孔之書咸列左右暇則端坐諷玩研極旨要蓋深有志於兹道也搢紳之士號之曰道玄齋屬豫繹其義夫道充滿乎天地散見於事物日月星辰之運行山嶽河江之流峙皆道也大而三綱五常小而方技之屬亦道也人受天地之中以生與天地參而為三亦充夫是道之大者而已道而至於玄斯為極矣但玄之一字凡儒書所言若天之玄舜之玄德其義或殊也老子曰玄之又玄則玄者至美至善而無以加之謂也老氏之所謂玄其易書之所謂神乎老氏之學大槩以清淨為宗以養性為要其説與軒轅相近似漢初治其言以黃帝老子並稱良有以也道玄觀乎黃帝老子孔氏之書區别其源流究極乎同異掇其同乎道者以治吾心以修吾身則斯道之玄無以易矣窮而獨善守此道也達而兼善推此為良相良醫同乎濟物無二道也道玄之學能究斯道之玄矣醫之道通乎神聖工巧獨非玄乎搢紳之咸尊道玄曰玄齋先生真知言也道玄之大父志可翁年九十餘視聽不衰學行益著則斯道之玄蓋世守之矣吾聞楊氏系出岷峨蓋子雲之裔子雲作太玄千數百言以擬周易其書具在質諸家學尚有足徵否乎幸以語我聞禮堂記友人楊伯禎侍親槎溪之上讀書取友不妄與人交往來封溪恆語豫曰熊從禮相與有桑梓之好賦性敦厚有志於學名其所居之堂曰聞禮幸為之記豫曰先聖教伯魚以學禮儒先君子備釋其義不敢贅為之説夫有天地即有是禮記禮者謂天尊地卑而禮制行矣是禮肇於鴻濛之初而成於太極之後陽升而在上天之所以尊也陰凝而在下地之所以卑也君尊也臣卑也父尊也子卑也君臣父子之分固法乎天地矣天地造化運行不息四時行焉萬物生焉各從其序而不相雜此天地之禮也聖人制禮因人情而為之節文君臣也父子也其道固法乎天地矣夫婦兄弟朋友豈獨不法天地乎皆禮之當然猶天地之運四時成萬物也從禮處乎家庭日用之間酬酢事物處父子而全其孝慈處兄弟而全其友恭至於夫婦為人倫之首處之各盡其道過者節之不及者文之全乎彞倫合乎天理則禮之本立而人道備矣禮與天地同節蓋謂是也過庭之訓伯魚聞之從禮讀聖人之書而見之躬行亦猶親炙而聞之也階庭子弟朝夕侍從禮之側觀儀矩之間亦猶親炙聞之矣禮書浩繁經禮三百曲禮三千他日從容翰墨之餘尚與伯禎從禮論之姑綴是語以為之記存心堂記君子之務於存心者何也蓋心者性之郛郭其藴之為四德發之為七情皆心之所統故心之能存則性得其養情無所縱而後為成德之君子焉清江黃氏遜志之令子曰子範為郡庠上舍生名其燕處之堂曰存心因某氏蘄余為斯堂之記於是記之曰為學而存心者一也而心之所存者非一也存心以敬主一無適必常收斂必常惺惺故曰一也四端發見隨其所遇故曰非一也其存心於仁乎仁莫大於愛其親小而至於伐一木殺一獸必以其時是亦仁也存心於義乎義莫大於敬其長小而一毫不妄豫一毫不妄取是亦義也存心於禮乎禮之大者在安上治民小而手容之必恭足容之必重亦為禮也存心於智乎智之大者在窮神知化小而識昆蟲之變化辨草木之華實亦為智也嗟夫心雖方寸之微而包括天下之理君子欲是心之存非徒寂然而不動必也感而遂通天下之故以之飭躬以之樹勳為忠為孝感繇於心子範將繇郡學而升之成均薦之春官其筮仕有日故告之以是云稽古齋記友人晏彥文貽書語余曰往嵗自洪還廬陵辱贈以言距今十有餘載相慕如前日也結廬郡城之陽名其讀書之室曰稽古幸為之言以自警余嘉彥文之有志乎古因為之説曰虞書贊其君臣咸曰稽古蓋以之德之盛垂之簡册為天下後世法也宣聖刪書斷自唐虞以下士欲稽古舍是將何所法乎夫堯舜與人同耳古之人可為堯舜吾獨不為堯舜乎士生斯世得天地之氣以成形得天地之理以為性古之人非有異乎今也今之人非不能如古也堯舜之道孝弟而已矣今即其書而觀之於堯則曰克明峻德以親九族也於舜則曰慎徽五典五典克從也堯舜之治天下所以為帝者之盛咸以是而推之耳士而法乎堯舜得志則行道以濟時不得志則修身見於世其道亦不出乎孝弟彥文修之於己行之於家必曰吾之孝弟何如堯舜也堯舜人倫之至亦率是性而已非有加也古之時或異乎今之時淳龎未散也今之人不異乎古之人性本同也世道有異人之性無異也謂今之人不可為古之人非知言也行古人之道則可以為古人矣人皆可為堯舜豈欺我哉若曰稽古而致力於記問詞章則桓榮之流矣非篤志於古也殷賢相告其君亦曰學於古訓乃有獲又曰非知之艱行之惟艱彥文能師乎説則盡乎稽古之道矣彥文推靳氏遺意論士之品三雖極其名狀然但可以警乎今之人難與稽古並論也何時重會諒有以起豫焉篁谷記淮士朱信伯語余曰維揚之六合先世所家也淮地多平衍少山距吾之居有谷焉山勢回合狹外而寬中家君結廬其間環植以竹藏修于兹不知其幾十稔矣士友因號之曰篁谷先生形諸咏歌凡若干首李祕書五峯序其篇端而始末不悉幸為之一言余諗信伯曰揚州土宜篠簜則居於其地者家有竹也往在承平嗜利者包山絡野恆以畝計釋老之流冠帶之士凡好事者多植之軒窗間以娛心目或以竿計焉喪亂以來園池臺榭悉化為丘墟瓦礫而竹之産兹土者牛羊牧之斧斤伐之蓋已赤地無餘矣尊君所居之谷尚存而無恙豈非神明之所扶持而竹君平安有能日報者乎信伯曰淮當兵衝蒿萊滿目所謂篁谷第見夫芳草萋萋流水泠泠耳眷眷斯谷而不忍忘者屋家君之所基也竹家君之手植也屋燬矣結茅葺之猶有堂構之思也雨露之養萌蘖之生竹尚可以封植也家君之好竹豈欲擬封君耶蓋竹之為物其心虛似有容也其節直似有守也貫四時而長青傲氷雪而獨立有君子之德焉家君纍經亂離不易所守蓋比德於竹也故惴惴焉保夫咏歌之什恆恐失墜以為家君憂耳余喜信伯能成其父母志因次第是語使歸而質諸庭訓尚有徵焉篁谷先生字朝實篤學善文父子之學蓋皆有源委云樗隱集卷二
