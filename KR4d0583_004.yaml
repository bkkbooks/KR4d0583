body:
  text: 樗隱集卷四元胡行簡撰記晦園記余擢第入翰林紬國史竊觀世皇混一海宇不愛髙爵重幣禮致巖穴之士有自布衣趨拜極品者綸音諭郡國懷材抱藝晦迹丘園者悉以名聞清修苦節之士由是彬彬矣江右以遺逸徵者臨川吳文正公公之學問道德海內皆所知尊聞其風而興起者豈無其人而余未之見也余持憲節還鄉慨然有遁世之志蓋漫士而樂於隱也嘗逰金灘之上留宿盧氏館以中出晦園二字示余曰翰林吳主一所書也余諗以中曰君真有意於隱乎抑恱是名乎以中曰吾得姓受氏實始於朱先世由新安徙渝之蔣溪逺祖繼盧氏後歷世滋久遂仍其姓不敢易也嘗營别墅於居第之左竹樹陰森園池雅飭主一下榻其中每杯酒從容輒曰君故新安之朱則紫陽夫子之同𣲖也學者尊紫陽曰晦庵先生豈不可遡先生之餘澤仰大賢之髙風名斯園曰晦園乎余辭不敢而主一故為之書兵燹屢更園已蕪廢而斯字獨存豈詩書之澤尚存而不墜耶幸為記之余聞兵變之初文臣武將領郡寄握兵權者多望風先遁使郡縣丘墟赤子塗地通都大邑鮮能為斯民保障者以中獨奮空拳冒白刃率其鄉民僇力抗敵以保鄉井聞王師至則簞食壺漿率先迎候努力前驅鏖敵兵奪其戰馬郡城遂復邑境以安其功有過人者臨江鎮帥定子靜余同年進士也每談以中之能曰以中儻貪富貴則勳業可立致悉其智慮佐復鄉都不過欲歸安田里遂其沖晦之志而已魯仲連一出而却秦皆隱者也余聞斯言而起敬之夫君子之出處非有心於顯晦也當可為之時則析圭儋爵願為帝臣處乎叔季則懷瑾握瑜以韜光養晦非沽譽也以中退處丘園屏迹自晦兒孫林立篤意義方賔友過從情致欵洽優遊晚節樂孰過之矧金灘之地介乎清江碧嶂間章水經其南秀水環其北山川獻狀資乎吟眺與晦園之景互相映帶也余與以中有交遊之雅因次苐其事倡能賦者詠歌之聽雪篷記荆揚地卑多水民之利懋遷逐漁釣者多樂舟居而功成名遂之流隱居求志之士若鴟夷子皮煙波釣徒咸扁舟江湖以自取適於是林栖邑居之士恆慕效之名所居室或曰篷屋曰畫舫齋皆是也豐城劉伯序從余同年李信豐學攻春秋試有司輒不偶乃悉其聰明專精于詩往往膾炙人口築室劍水之西以供吟嘯規制如舟題曰聽雪篷求為之記余謂之曰古之人有聽雨者矣有聽松風者矣雪無聲也何自而聽之伯序曰如彼雨雪先集維霰霰之始作也敲乎鴛瓦躍乎文陛如擲珠如撒玉固鏘然而可聽也及夫密雪既下飄風載興灑窗紙折巖竹小聲紓徐大聲震厲倐然而有倐然而無殆如石聲之難和絲聲之斷續也少焉夜氣澄寂隱几微吟吾伊之韻風雪之聲雜然相和恍兮如休乎舴艋之中而聞波濤之澎湃漁歌之欵乃也則吾之聽雪豈為過乎余曰聲出乎物聽因乎人善視者視於無形善聽者聽于無聲子之聽雪猶近乎有聲也無聲之聽雖質之鴻濛渾沌不能知其然也然則將如何太虛寥廓沖漠無眹上天之載妙在無聲如斯而已矣康節之詩曰玄酒味方淡太音聲正希此冬至所賦也雪冬至而盛陽至子而復靜以求之造化在我矣奚聽為時夜將半窗月如雪相視一莞寂然無聞遂書以為記棲碧山房記道士鎦秋碧名其居室曰棲碧山房宋學囦題之劉仲修記之豫遊西峯而見焉蓋二絶也秋碧復徵豫言豫惟碧山隨處而有顧栖其間者何如耳往嘗北過居庸南登閩嶠見諸名山髙摩青天下壓坤軸攢峰疊巘競秀爭妍每山水會處則亭觀之美室屋之麗駭人心目間從好事者遊焉非老子之宫則釋氏之居也其徒之處乎兹山與俗浮湛視世之人無以異恬不知碧山為可樂也秋碧則異乎是所居之室不雕不堊中設玄武象傍列孔老之書泊然靜守獨與神明居開窗而坐則碧山之清浮乎几席據樓而吟則碧山之潤溢乎筆硯朝而遊焉夕而休焉起居飲食莫不與山接是碧山之棲他人或未知其樂獨秋碧能知之也或曰大江而西山之名載藉著逺邇者曰匡廬曰葛峰曰玉笥秦漢之君南巡至九江嘗望而祠之多靈藥可服食古仙異人恆來往其間秋碧不彼之棲獨眷眷乎此何居豫復之曰一丘一壑咸有勝趣知其可樂則穹壤之內山皆可栖也不知其可樂則泰華吾知其髙爾崑崙玄圃吾知其竒且逺爾非有得乎山之趣也矧西峰舊傳有梅南昌遺迹則秋碧固聞梅君之風而栖乎是山也秋髙氣清氛埃澄寂與秋碧徘徊石壇之上仰視層旻俯眺八極招梅仙於渺茫納萬里於一碧尚吸沆瀣而賦之姑記斯語俟知山之樂者擇焉方壺記西夏常公少有髙世之志家故名族生長富貴恆欲屣視軒冕寄興煙霞揮斥八極與造化者遊因號曰方壺四方之士想其風采咸以為神仙中人非流俗所能測也豫遊崆洞公特列髙仲所為記求著其説豫與公有通家之好奚敢以蕪陋辭豫聞方壺乃海中神山之一仙聖所居其説具載列禦冦書世以為寓言咸莫之信惟山之有無不足深辨所謂神仙者若果有之要必離世獨立超然物表非沉溺聲利者所能也世無仙山則已有則唯無欲者能窺其奧秦漢之君窮極奢侈欲浮海以求非惑歟嗚呼天地肇分鼇極以立神州赤縣環瀛海以為奧區聖神代作彌綸玄化斯民熙熙皥皥躋乎壽域至于山川草木鳥獸魚鱉莫不咸若此蓋域中之神仙人居其間者咸有至行則亦仙聖之儔也世衰道熄七雄並爭赤縣神州幾何不為鯨鯢之區民殆變為異類矣列禦冦生乎其時厭濁世之粃粳悼民生之寡遂意為中國不可居矣海中乃有神仙所居敻絶凡俗庶乎可求而世人不能超然以獨往也噫列禦冦之言若是殆亦憂世者歟矧當時避世之流固有往來商山桃源之間而世人未之識也謂世果無仙山然歟否歟公博學好古工為詩文以方壺自號豈好語怪神者蓋如子房欲從赤松子遊俟它日名遂身退翛然歸隱優遊江南諸名山人之見公者或邂逅于此而復遇于彼出入隱顯莫知所終安知世之人不以為仙如南昌梅福云序矩堂詩卷序余假寓蕭水之上與豐水壤相接水之西有佳境曰矩塘居其地者多秀而文恆欲往遊而未能也余君所瞻邂逅紫宸之宫貌清而古學博而通飄飄然若神仙中人因數相往還常語余曰我余氏之先異人司馬潛為相宅曰子孫蕃昌代有顯人即今矩堂是也五百餘年于此矣居第之前有山相望屹然獨立咸目之曰方岡前豐城尹林元凱見其勝境曰矩者方也塘以矩而岡以方名皆可觀法宜顔其讀書之室曰矩山以著其美遂書而揭諸楣間仍為之序先生辱與吾遊能不為之言乎退而稽諸聖賢之書曰不踰矩曰潔矩釋者謂矩所以為方者也君子之為學也靜以修己莊以待人敬義夾持凛乎恐墜內外交修求合乎矩庶乎其行之方截然如山也觀乎山斯知之矣端雅靜重山之體也蓄泄雲雨山之用也陰晴朝暮千態萬狀不能汨乎山猶日月之間酬酢事變不能撓乎我也煙收霧斂嶄絶若屏儼然儀型相對几席我之厚重不遷猶山之萬古一碧也知者觀乎山斯可進德矣雖然天下之山莫髙於泰山故號為岱宗言四方之所宗也詩曰泰山巖巖魯邦所瞻今君既名藏修之室曰矩山而字曰所瞻其志蓋可見矣所瞻之大父必誠先生文學節行為世師表嘗為撫之儒學教授樂其故鄉山水遂歸隱不仕云求志亭詩序豫以使事出西昌參政全公肅客快閣之上顧瞻江山情景具集距城六七里林木掩映閭閻參差或指示之曰此珠林市也有劉氏者居之數百年矣由唐迄宋舉進士者三十有七人去年秋劉氏之以賢能稱者曰楚字子髙復貢于鄉鄉人榮之翌日子髙相過從語余曰吾居第之東偏治隙地構亭其間旁植花竹中列圖書以為藏修遊息之所題曰求志江州守劉公楚竒記之名人勝士詠歌相屬幸序次其説豫復之曰君子之學莫先于立志此志一定可以通天地貫金石以之為學則進而為聖為賢此志也施之于用則為民立命為世開太平此志也窮之所養逹之所行皆不離此志耳古之君子如伊尹耕乎有莘頌詩讀書樂堯舜之道及湯舉以為相則使君為堯舜之君民為堯舜之民皆行其素志也近世大儒有曰志伊尹之所志今君名所居之亭曰求志其將以科第為志抑將以伊尹之志厚自期待也志乎伊尹則道德日趨于成功名不期而立志乎科第則與世之志富貴者等非豫之所望也子髙年壯而氣鋭質美而好學能審于求志決矣尚喋喋乎斯言者責善朋友之道也老幹詩序老幹者何大參周公所自號也幹者何老樹之有柯有枝也幹而謂之老者何傲氷雪閲歲年挺然而獨秀也即其類而推楚之椿八千歲秋八千歲春若可謂之老矣而其言荒唐殆難信也西若木東扶桑枝葉亘乎萬里繁陰芘乎宇宙若可謂之老矣而廣輪寥廓殆不可得而見也然則是幹也萌芽乎鴻濛之始長茂乎大極之域與蟾桂同芳而不矜其秀與天地同久而不謂之壽斯可謂之老矣而其説非經見也詩之雅曰維申及甫維周之翰召公維翰釋者曰翰者幹也謂其皆為時之楨幹也公藴經濟之材任棟梁之重優遊廊廟之上則論道德陳訏謨使明堂奠安而屹擎天之柱此公之為幹無異於甫申也出殿南服來旬來宣易斬木揭竿之俗為佃漁為絃歌方數千里涵濡德澤咸在蔽芾之內此公之為幹無異於召公也吾又聞古有華平木者世治則其華平世亂則其華側公樹立之易亂為治斯幹也殆與華平之木並秀于穹壤間其為老也宜哉重為之歌曰幹之老兮嵯峨芘蒼生兮陰孔多幹玄化兮宣至和木連理兮海不揚波又歌曰華之平兮海宇安幹之老兮傲歲寒瞻帶礪兮河山詢厥美兮埀不刋黃則行集杜詩句序清江之東里黃氏世以科第顯趙宋時名薦書者七人登科者三人有元至正丙申郡上賢能書于行相國黃氏之彥曰則行復以春秋舉進士搢紳大夫咸曰黃氏代不乏賢矣為之文若詩以彰其美分閫定侯樹髙門于其里表曰擢英其榮耀可謂至矣而則行慊然不自足也閉門却掃利逹不入于心闢一室以書史自娛壺觴籩豆列置左右酒酣激烈則取杜少陵詩長哦髙咏慷慨懷古人莫測也或問之輒曰吾所欲言者少陵先言之矣因摘其詩中語集而成詩凡若干首不異其自賦也逺近多傳誦之從弟則建悼其兄之志不遂欲託詩以自見也率族人之好事者捐金繡梓以傳于世徵序其端余惟少陵所遇之時即則行所遇之時也則行之學之志蓋希乎少陵也少陵志不獲展感時撫事形諸歌詩以舒其忠憤之氣蓋有不得已耳則行借少陵語以發其性情其志亦猶是也但少陵羈旅萬里艱阻備嘗而則行栖遲丘壑與湖山風月相周旋其吟興差可羡也或謂坡仙無取于集句蓋有激而云不可以評是集也讀是集者能無慨然于斯敬亭山樵圖詩序文江友人袁文欽示余山水圖一幅曰此敬亭山樵圖也敬亭山在大江之東竒秀聞於天下鮑昭李白之流形諸歌詠亹亹不厭至今讀其詩者可以想見其勝寫而為圖者朱彥和也彥和之大父野翁嘗為江東幕賔樂其山水之美遂卜居焉至彥和嘗侍其尊甫秋崖為南靜尹山川阻修不勝遽反乎敬亭也而南靜之民懷尹之德愛尹之深攀轅卧轍情終不自已也斯邑遂為桐鄉而秋崖因以為家彥和不忘敬亭山水恆曰一丘一壑吾父祖所經營也殘山剩水吾童子時所漁樵也安得恝然而忘情乎寫之于圖欲朝夕覽觀以紓懷抱耳彥和以豫嘗遊江左求為之文以倡夫歌詠焉余病且眊諾既久未有以復暨督之急因為之説曰世之髙蹈逺引者恆栖遲巖穴以遂其志而軒冕之士恬于勢利者每寄興泉石託意雲林所以謝紛囂而樂夷曠陶情性于物表也彥和之寫是圖蓋不忘堂構之思而超然山水之外儻驄車出使道過敬亭舊時遺老必能言髙明祖父之事甘棠封植逾久逾昌想往哲之髙風繩故家之步武措諸事業必將與敬亭相與悠久矣樵云乎哉青山白雲圖詩序上谷劉公治臨江之五年出山水一幅示余曰此白雲山圖也山在雲州之境先君世業在焉往昔讀書其中起居食息惟山是依今馳驅四方與接為搆而白雲悠悠常往來於懷也遂命畫史寫而為圖時一觀覽以舒鬱滯子其敘次其事以倡夫歌詠者余嘗度居庸涉灤水按轡山谷間所見諸名山不可僂數蒼崖峭壁巉絶孤立衆水縈紆合流其下者龍門也連峯疊巘樓閣參差遺世羽儔錬石其中者金閣山也層巒秀拔俯挹羣山白雲時興彌漫巖壑倐焉而舒倐焉而收千態萬變不可名狀者此山之所以得名而白雲所從出也余顧瞻裴回欲往不果去之十餘年山川勝槩重見于毫素之表猶使人鄙吝都銷矧公桑梓之鄉英華清淑之氣鍾為人物生于是也長于是也藏修遊息于斯而先世蒸嘗于斯也安得恝然忘情乎宜公之眷眷兹山也觀是圖者思親望鄉之心蓋油然而生矣公成均髙第襟度峭整撫兹山之白雲溥八荒之霖雨飄飄琴鶴歸過故山儻獲從周旋尚為公賦之竹山隱居詩序豐城之西有佳山水曰竹山地偏而境勝篔簹滿谷篠簜彌山黃氏世業在焉其子弟之彥曰尚英讀書奉親不求聞于時搢紳士過之者愛其所居幽雅而喜其志之髙也因名其奉親之堂曰竹山隱居咸為之賦詠尚英以余聲相聞而道相似也徵序其事夫士生斯世所以與天地參者扶綱常立人紀也隱者潔身獨善長往不來人之大倫蓋有不能全也尚英之隱居也則異乎是所居之室則髙明祖父遺基而肯構也環其居之竹則先世手植而勿翦勿伐也宗祧在焉族姓聚焉嵗時佳節從容賔祭衣冠雜遝爼豆周旋二親康強載色載笑羣季俊秀捧觴上壽顧斯竹曰吾親晚節怡愈竹之挺乎歲寒也孫子昏定晨省竹之日報平安也天倫至樂藹然斯堂猶竹之生意流動乎四時也隱居奉親之樂可謂至矣吁昔人之隱有好梅者矣有懷松菊者矣皆隨所嗜好以娛其心志雖欲悅乎親而有所不逮也尚英隱而愛竹內悅乎親而外同乎人其美不亦大乎惜世之人知竹為可好而不能比德于竹也淇澳詩人美武公之德惓惓于竹詠歌不厭尚英蓋近之矣尚英系出黃文節公家學源委具載譜牒兹不贅云秋山行色圖詩序姑蘇張公舉進士第擢膚施令以善最聞超拜臨江副守邑士庶借留不能得邀善繪者寫為圖題曰秋山行色詠歌以餞余竊誦其詩而為之言曰天地之化流行乎四時而見諸溪山之美者皆可觀可詠可圖可賦不獨秋為然也而名人韻士流連光景每於秋而寓意焉惠連之懷秋也少陵之秋興也鏗鏘金石激越宫商至今讀之者可以陶性情於一時遡髙致於千載也公歷秦韓涉荆吳道途所經耳目所及形諸詠歌自有不容己也西風嫋嫋木葉蕭蕭古道荒涼驚沙迷目撫山河之岑寂感昔時之戰爭蓋不勝宋玉之思矣若乃秋空無雲萬里一碧連山疊巘隱見馬前秀色娛人可攬可挹望太華而笑韓子之狂過首陽而慕夷齊之節髙風偉度固可師也歷峴首經大别叔子之碑漫不可識神禹之柏豈無有封植者乎赤壁續老坡之賦匡廬哦太白之詩蟠胸詞氣與兩仙頡頑霄漢間所謂吞若雲夢者八九也余觀公襟度蕭爽與秋同潔風裁峻整與山俱髙搢紳大夫士寫是圖以餞蓋善于取譬矣吁包藏造化者秋也蒼茫雲雨者山也成萬物者莫過乎秋産萬物者莫踰乎山公政教行乎膚施膚施之人既沾其生成之惠矣吾臨江之人獨無斯望乎秋山之澤沾溉者逾廣則詠歌者逾盛公之事業固將與嵩髙韓奕相為炳煥傳諸悠久豈獨詠歌斯圖而已乎許承旨同聲詩序賔興之二年某充賦春官隨兩榜之士以門生禮拜安陽先生于私第因得先生貢院中諸詩讀之藹然棟梁吾道之心而形為治世之音也又數年先生被旨掌禁林某承乏屬僚備使令之末復得先生同聲集讀之則先生家居時與孰客馬明初氏倡和成集者也其音節髙雅法度森嚴協乎律吕振乎宫商如鈞天廣樂奏於洞庭之野金聲玉振秩然而有條風起水湧煥然而成章聲文相和可以侔造化可以格人心彼作樂者初不知其神妙之至此而聽之者釋然而忘疲充然而有得也因作而嘆曰世言歡愈之辭難工憂憤之詞易美觀於先生之詩而後知其言之有激而非和平之論也先生以文章政事為時名臣賡歌一堂之上既足以協神人和上下矣退而家居獨能與韋布之士相應答如響應聲其志之所存詩之所至豈得窺其倣佛而明初往復循環有倡斯和何材力雄敏如是哉在易乾之卦有曰同聲相應同氣相求釋者曰上應乎下下從乎上也夫先生不以道隆望重為矜故能應乎下明初不以疏逺貧賤為慊故能從乎上上下之志既同而彼此之道合宜其播之聲詩形諸歌詠如樂之無不和而得夫性情之正也古者時巡則必命太師陳詩以觀民風今先生與修國史儻以是詩編之簡册傳之天下後世使讀者消其卑鄙倨肆之心而作其和平正大之氣則同聲之效不亦大乎樗隱集卷四
