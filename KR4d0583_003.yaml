body:
  text: 樗隱集卷三元胡行簡撰記春暉軒記湄湘之東兩舍許有山曰湓峯挺奇聳秀外固而中寬世居其麓者黃氏也黃氏之俊秀者曰璞字石瓊五歲失所怙母徐氏躬自鞠育至於成人母高年康强曲盡孝養居第之左闢小軒為奉親之室浙右趙行素先生為之名春暉取孟東野語也璞屬余為記遂為之言曰造化流行發育萬物功用之大莫盛於春凡其自生自植勾萌甲拆沐春陽之暉而臻於蕃廡者莫草若也以一草之微沐春暉之恩發榮滋長得遂其性陽春德澤何如其深且厚也母之於子亦猶是耳孩提之生蠢然無知動靜食息不能適其節癢疴疾痛不能謹其微為之母者心誠求之所以致其鞠育之勤俾至於成童何如其用力也暨其長也教之使學為之有室幹蠱承祧克自樹立母心始得其安而有終老之望也然春暉之及物不勞而成功母之鞠子何如其勞也兒之念母心猶寸草至微也母德如春暉至大也將何以竭其報哉東野可謂善形容矣然觀天地之化四時具而後成歲春而生之夏而長之秋而成實冬而歸根四時不具則歲功虧矣言春暉而違乎三時則天地造化所以生物成物不能全其始終矣詩之言曰欲報之德昊天罔極親恩之大蓋同乎天無一事而非仁也無一息而不愛也生生之德初無少間徵之天驗之人有以異乎無以異也即東野語而稽之詩人所言必劑量於其間矣行素博學躬行必有以語子奚待余言今朝廷以孝治天下求忠臣於孝子之門措之於用而推恩以及其親他日尚有觀焉竹林書屋記湄湘在蕭洲上游山水之勝甲於一郡蓋其山自撫之大華綿亘數百里至於兹邑峙而為大秀玉笥皆曄然為郡邑之望荷峰與二山雖莫相雄長然挺奇育秀鍾為人物若鄒氏之代有顯者荷峰之清淑所發也鄒氏世家鰲溪之焱坪其遷於兹山之麓不知其幾十世矣自初迄今咸以詩書起家篤於義方之訓者曰思齊思齊三子長曰直字允良次曰順字允遜季曰端字允臧築室為講學之所環四周皆竹因題之曰竹林書屋斯屋也朴而不華儉而有制山川獻狀若拱若揖層巒秀巘如屏如帷晴嵐暖翠輝映軒窗之外者湓峰之聨絡荷峰也玉虹蜿蜒泓澄如練滔滔安流環吾廬而過者長江之發乎杯溪也清時暇日藏修於斯游息於斯境曠地偏纎塵不到微風動竹戛玉敲金唔咿之聲與竹韻相和殆如雅奏之發乎鈞天黃鍾大吕振乎瓦缶之餘也夫貫四時而常青傲冰雪而獨立者竹也君子有取焉竹之心猶吾之虛而有容竹之節猶吾之直而不阿蓋比德於竹而結屋於斯也昔之愛竹者多矣然託竹之美形容盛德莫如衛武允良昆仲誦淇澳之詩切磋琢磨交致其力奚患學不成名不立哉為士者希賢尚其朂之瞻藜軒記蕭峽居淦上游山水清麗觀金華黃文節公十詠備見其勝峽西四十餘里有橋曰金名乃揚名斷金兩鄉水出焉橋之涘多舊家彭城劉氏世居之族為金川望其族之尤彥者曰翰烈為郡庠弟子員嘗從余授春秋相與有年請余顔其讀書所豫因名之曰瞻藜蓋取劉向事也向漢之宗室嘗校書天祿閣夜有老人持青藜杖來訪自稱太乙之精吹杖端烟光洞照幽隱盡以天文祕記授之向由是探賾造化博極羣書為漢儒宗翰烈向之裔有志於學聞乃祖之風固宜勵業以紹休前聞人不但慕其名而已夫瞻者自卑而望乎高自下而望乎上詩云瞻仰昊天瞻彼旱麓皆是也青藜之光寥乎闊逺可望而不可親矣游目雲漢之上瞻乎奎壁之間文章昭回之光曄然與太乙青藜之焰相為輝映神交意合凡得於觀感者自足以發揮文采而書眼如月載籍藴奧可以洞見而無餘矣瞻彼菉竹猶可資以比德瞻青藜之光以名斯軒固可與之匹休也或者謂太乙青藜杖之光乃好事者之言則世傳既久不可謂無是事也子房遇黃石公編其遺書豈亦無是事乎余嘗經穀城山謁黃石公祠檜柏森嚴穹碑雄文駭人心目凜然使人起敬惜劉向之遇太乙未有列之祠祀垂之紀述無徵而人弗信爾然太乙天之尊神漢廷多祠祀之云靜隱齊記司徒辨章公鎮西江幕下多材能之士豫奉使咸得見之任君從禮倜儻士也往掾湖東憲與豫弟行義同署故相知尤深間請曰吾家在河東土厚水深民俗朴茂高蹈逺引之士多居其間今雖宦遊四方非豫心樂也故鄉風物寤寐見之於是匾其所寓之室曰靜隱欲將歸乎故鄉習靜以寄吾隱也豫復之曰動者靜之對也顯者隱之對也唯靜故隱唯動故顯天地造化生生不息凡其可見者動而顯也其不可見者靜而隱也人位乎兩間動靜隱顯與造化為一固將體天地生物之心以彌綸斯世潤澤生民豈可貪夫隱居之靜恝然無意斯世哉今疆埸未寧甲兵未戢方當運籌出奇掃清氛祲使功昭於時名垂於後然後幅巾還鄉優游林壑靜隱之樂孰大於此若超然獨往果於忘世則非時中之道矣君肄業胄庠通乎儒術諒亦見乎斯道奚俟豫言思益齊記友人黃尚德訪豫蕭洲寓舍因請曰筠陽謝從震篤志於學名其藏修之室曰思益求為之記余曰經以不學而思為無益也今乃以思為有益何相戾也尚德曰從震以思益名其齊非不學而思也欲刻志講學以求新益也乃為說曰君子之所以學曰致知曰力行交致其力庶進乎益也致知矣而不力於行是徒知而無益也專用其力於行而不致其知則何以為行之本而有益於己乎徵之於易巽上震下其卦為益震雷也巽風也風烈則雷迅雷激則風怒兩相助所以為益造化之妙固相資而成也即此而觀則致知力行必內外相資然後可以日進乎益也然將何以用其力哉見善而能遷益也有過而能改益也讀書窮理日用行事謹吾心之所發審乎善惡之機發乎善則推而行之發乎惡則遏而絶之今日行一善焉明日行一善焉積纍之久雖無求益之心而進德修業日進無疆自有不期然而然者矣又何待於思乎吁學而不思思而不學非能有益也學也思也聖人教人之要法其功欲兼盡也思進乎益是學必求其成也顧吾之立心何如耳益之上九以立心勿恆為戒思造夫道者尚鑒於斯言也從震世本筠之名族前代盛時決科者凡幾人名薦書者凡幾人家學相傳綽有源委從震既力學常存求益之思將見其繩祖武追先哲不難矣思云乎哉堅白齊記余幼讀徐偃王碑知徐氏為三衢名族代有聞人往歲承乏詞林與衢士徐志尹同署文學醖藉蔚為儒林之彥今游番禺復識郡守徐公炳文侃侃乎松柏之姿皎皎乎冰霜之操信徐氏之多賢也公嘗名其讀書之所曰堅白齊搢紳咸頌詠其美僕不敏謹稽其章旨為公續陳之佛肸之召夫子也知趙氏不足與有為欲得聖人行道以濟時也聖人或行或止其動以天子路未知耳譬物之堅白焉磨之而不磷也涅之而不緇也佛肸能浼我哉學者則異乎是矣金至剛也或化為繞指之柔衣本素也或為風塵所緇理固然耳在聖人則不然其堅也猶山嶽峻峙震雷不能破之其白也猶白雪之白凝塵不能汚之蓋聖人之德純乎乾剛濯以江漢暴以秋陽皓皓乎其潔也誰得而磷緇之吁聖人者萬世之標準也去之數千載遺書尚存觀其書迹其事聖人德容可思可法無徒慕其名也吾觀公秉心堅正而不為物撓操行潔白而不為欲遷蓋知學聖賢者宜以堅白名齊也古昔座右有銘咸以自警公藏修於斯游息於斯循名思義進德孰有涯姑書是語與同志者講焉友古齊記西昌據青原上游山勢四環江流如帶英華清淑之氣磅礴而鬱積士生其間多秀而文若劉子高氏王子啓氏廖子謙氏皆辱與余游而鍾仲輔氏則又因子高而識也仲輔名其讀書之室曰友古徵為之記夫友也者友其德也古之人不可得見矣况可友乎吾所取以為友者質之載籍以觀其言考諸行事以觀其德友諸吾心措諸吾躬古之人能致知矣吾獨不能焉古之人能力行矣吾又奚不能焉致知也力行也古之人所以為聖為賢皆是道也生乎今之世欲友乎古之人要必自知行始然將何以用吾力也亦曰堯舜之道孝弟而已矣夫孝於親友於兄弟日用之所常行夫人而能之也奚獨堯舜然哉堯也舜也其知生知其行安行知之極其至行之極其至耳世之人具是理而不能知也汨於欲而不能行也堯舜之事載諸方策吾取以為法焉曰孝曰弟不如堯舜不止也處乎君臣處乎朋友莫不皆然庶無愧乎古之人庶可謂之尚友千載庶可謂之友其德矣舍是弗務從事於記誦詞章之末習為詭異以驚世駭俗謂之尚友古人則余不得而知也子歸至西昌見前所謂三君子者質以斯言必有以教我虛白軒記銀漢澄秋金波麗夕余燕坐寂然心志凝默觀夫天地之大六合之廣瑶光滿空萬里一色慨然曰兹非所謂虛室生白者乎莊周氏以蓋世之豪負邁往之氣吐詞立論欲前無古而後無今也詩書禮樂仁義道德所以扶綱常立人紀周反欲離而去之棄而絶之然是道也周非不知也不過肆為寓言以勵其驚世矯俗之志耳故其著書雖若歷詆聖賢而尊之之意固非不知也虛室生白之論乃有見乎此心之妙與吾儒蓋不異也夫宇宙至虛也而涵萬象焉吾心至虛也而具萬理焉虛則吾心之量也白則吾心之理也鴻濛未判虛也白也混而為一不得而名狀也太極既立人受天地之中以生吾體即天地之體吾心即天地之心靈臺澄瑩皎如日月非所謂虛室生白乎斯言也非寓也天下古今之通論也即儒書而驗諸南華之書同乎異乎吾不得而知也毗陵高允升治清江游心沖漠淡乎無營蓋得於清淨寧民之要公退之暇坐乎虛白之軒黃卷中與聖賢相對凡天地之所以大日月之所以明觀之造化體之吾心天君泰然輝光發越斯道在我矣措之於用則坐乎廟堂之上包乎海㝢者此道也察乎幾微而幽隱畢照者此道也允升有見於此異日造詣何可量哉孟子曰我善養吾浩然之氣尚推是道而準之焉順德堂記人之為道也莫先於愛親之仁敬長之義蓋仁無非愛也而必先於愛親斯所以為孝之至義無非敬也而必先於敬長斯所以為悌之至然孝悌而謂之順德者何也蓋天之降衷者均也人之秉彞者均也千萬人之心即一人之心一人之心即千萬人之心故推而達之天下無不同是以謂之順德言乃良心之自然非强為之也郡學上舍生熊氏仲章清江之俊彥也其所居之堂揭之曰順德蓋以為修己治人皆已之分內事而治人之道必本於修己修己之道必先於孝悌孝悌之道則所以為順德也故其處家則愛親敬長德之順也其事師則無犯無隱德之順也其交友則聞善相告德之順也立朝而事上則嘉猷之入告德之順也或出而涖民則承流而宣化德之順也處內處外無非順德而不悖無非由愛親敬長推而達之天下蓋如是夫仲章之父雲瑞性淳朴善訓子而子又克孝吾友某為余言仲章之賢余故為之記其堂所以勗其德以為事之本也谷雲記渝之南有山巋然獨秀曰鼎山山北折十數里竒峰叠巘層見互出有谷焉介乎銀沙之上陂陀環合外固而中寬鄒先生為憲之所居也回眺鼎山立當户外白雲來往宿乎簷端因見號曰谷雲焉學者遂稱之曰谷雲先生先生少有四方之志嘗泛彭蠡觀匡廬游鄂渚登黃鶴樓方嶽重臣薦掌教鐸位弗酬其志道弗見於用慨然曰吾將歸吾谷中與吾雲相莫逆無復出岫之想也攜書歸隱唯雲是依先生不忘乎雲雲未嘗離乎先生也乃即雲谷深處結菴一區為游息之地朝而出游雲隨杖履莫而來歸雲在几席斯須不相違也余嘗造斯谷弭節徘徊留宿其館雲氣悠揚飛舞左右先生曰斯雲也舒之則亘乎八紘斂之則不盈一縷招之不來麾之不去我與子素相好雲特相親狎也余因諗諸雲曰雲乎雲乎將長為白雲而栖遲山澤乎抑變化青雲而霖雨天下乎但恐蒲輪詣谷而雲為之先驅矣雲默然不應先生舉觴而歌曰吾之隱兮雲為居吾之出兮雲為輿相時而動兮雲隨吾而卷舒絃吾琴兮讀吾書山空無人兮唯雲與俱侣斯雲以自娛兮與造化而為徒歌聲繞梁聞者胥悅白雲依依若有德色乃相與劇談援筆而書以授能賦者屬而和之因記其事如左雪軒記造化嚴凝之氣至冬而其令始成四時景物之變惟雪色為得其正蓋白可受采而其質之美必醖釀之久而後可成也雪之在天地間非特騷人韻士好之雖樵童釣叟皆喜衝冒六花而往來山林傲睨江湖也豐城聶允儀世居穆湖之上嘗名讀書之所曰雪軒求為之記子攻詩及書而為學之志篤也觀乎雪足以進德矣夫雪之作也積之有其漸而成之不計其功北風其涼質之始胚胎也上天同雲華之始芬敷也萬里茫茫上下一色際天所覆逈乎纎塵騁余目於八荒其殆將超乎太素之先而㑹造化於吾心也子之名軒豈將觀雪而進學乎抑對雪置酒高會以娛賓乎允儀曰嘗聞孫康映雪而讀書矣程門高弟立雪而侍師矣鄙志固慕乎此也余以其言之可采遂書是語以為之記俾知所以自警云樗隱集卷三
