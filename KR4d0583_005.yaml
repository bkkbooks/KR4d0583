body:
  text: 樗隱集卷五元胡行簡撰序致亭詩卷序國子祭酒魯郡王公作亭于居第之側取君子學以致其道之語名之曰致公卿大夫士紬繹其義殆無餘蘊某讀而疑之以為公之道已推其極若無待于致矣以是而名亭蓋謙以自牧使實浮于名也夫道之大原出于天天道流行陽開陰闔雖萬有不同其為理則一致也天之生斯人也欲使任斯道之寄則所參乎天者豈有二致哉先生之為道不可窺已敢即其行事而論之公少時隱居嶧山讀書談道雖簞瓢屢空未嘗有憂色已而擢高科登膴仕祿賜之充若可以肆志矣而被服儉素出處如儒生此公之道處乎窮逹而一致也仕于王朝直道而行徘徊散地而不以為屈激昻憲紀而不以為矜廷論有所齟齬雖斥之外郡而不以為慊此公之道安乎夷險而一致也處己以嚴待人以謙故揚歷所至而稱其善出入成均而館下之士咸無間言此公之道著乎表裏而一致也使從容廟堂以大行其道庶幾天下之士知公之所以修己所以治人其道無二致也則名亭以致豈無意歟古之君子名浮其實不以為恥固多有之揚子雲名亭以草玄矣其初也泊然自守若無求于世暨久次不遷乃作劇秦美新以自鬻是不能守其玄也李文饒名亭以精思矣出竒畫䇿雖足讋強藩平僭叛而招權納賂終失守身之義是思有所未至也則其心術豈不與名亭之意判然為二致乎甚矣君子不可以不知道也噫先生處乎窮逹處乎夷險其表裏一致唯致夫道而能然也世之學者聞公之風尚知景慕况託處館下親承教數載者乎方壺詩序海宇混合聲教大同光嶽之氣沖融磅礴而人材生焉西北貴族聨英挺華咸誦詩讀書佩服仁義入則謀謨帷幄出則與韋布周旋交相磨礲以刻厲問學蔚為邦家之光至元大德間碩儒巨卿前後相望自近世言之書法之美如康里氏子山扎刺爾氏惟中詩文雄混清麗如馬公伯庸泰公兼善余公廷心皆卓然自成一家其餘卿大夫士以才諝擅名于時不可屢數若方壺常君河右之偉人也才總角飄飄然有凌雲氣下筆驚人如不食煙火之語暨長遨遊四方充之以學問廣之以見聞于是其所著述大篇短章咸中矩度鏗鏘韶濩翕闢宫商惜其流落江南邅回州縣不得與諸賢頡頏頌歌清廟以鳴太平之盛爾鄉友宋子與宗人胡震亨往來京師談公之美不絶口然時亦莫之用也二君一時作者惜俱已矣惟公之精神老而彌健文章學問與年俱高俯仰今昔不勝慨然姑識是語以徵來者秋江詩意圖序友人吳德新語余曰彭彥德隱居封溪之上篤志于學處乎市區而超然物表勢利貨殖怡然不動乎心間者囊琴束書將泛彭蠡觀匡廬遊赤壁登黃鶴樓以發揮其志慮增益其聞見也艤舟將行凡與彥德遊者盛供張以餞好事者遂命善畫者寫之題曰秋江詩意能賦之士悉形諸歌詠幸敘其事余惟四時之序其造化之運流行不息而天地之氣絪縕磅礴其至清者莫如秋其可為感慨者亦莫如秋積潦淨盡淵涵太虛水之至清者莫如江也水天相摩一碧萬里吾心之清蓋與之同其清也航一葦于西風納秋光之浩蕩胸次悠然與天地萬物上下同流風雩詠歸不啻過也彥德蓋有見于此乎若夫江山之勝風物之美凡接遊心目者可圖可賦可歌可詠慷慨懷古以寫其胸中之竒固足以振文采于一時紹芳躅于千載特騷人墨客之餘事耳非有望于篤學君子也櫓聲悠揚棹歌相續舟師催行浩不可遏姑以此語識其篇端贈塑佛像羅孔德序臨江之瑞筠山佛剎壯麗甲江右比燬于兵歷歲滋久非無長材碩望代主兹山然莫復舊觀者時來值力弗逮也葺屋以奉香火貯輪藏湖間師創之于先太虛師繼之于後二公示寂啓原師實來建大殿若干楹規制宏敞殆復其舊功埀成而不幸逝矣半間上人根參深重丕紹宗風緇俗之士咸曰董慧力者非半間不可相率狀其事于府大府敬而喜之三邑聞而信之既領寺事慨然以興復為己任謂佛菩薩象教未備聞南昌羅孔德最精于塑遂延之立三世佛像兩侍衛像既成觀者咸曰孔德之精藝絶倫真得三昧手也夫畫之于塑藝雖不同其肖品物之象一也繪畫之事存乎載籍者具可考獨像塑未之聞焉竺乾之事佛者以旃檀肖其像則刻也非塑也漢得休屠王祭天金人祀不用牲惟焚香禮拜其像則範金為之亦非塑也然㙛埴為象疑始于此李唐有楊惠之者與吳道子同學畫見其能不及遂去學塑其藝既精與道子齊名近世有以工于塑歷官正奉大夫號曰劉正奉具載虞文靖公所為記孔德既師事之宜其藝精也孔德絶葷酒篤志禮佛嘗誓曰願一心塑佛像如佛生存後果于靜夜見之宛然如佛之在目也余謂佛之道存乎其書求之吾心可得而知也佛之道寓乎其像欲人之因像而生敬即像以觀其迹即書以求其心佛之道在我矣孔德遊諸名山見先覺之士尚以是説諗之建溪序郡城之東三十里士有隱者曰黃則建氏隱居獨善不求聞于時治别墅植花竹窗户瀟灑圖書滿家日藏修其中客至則煮茗清談亹亹不倦高標雅度見者莫不敬之嘗名其室曰建溪余竊疑而問焉曰建溪出自七閩古荒服之地禹貢未之紀江右多佳山水而桑梓之邦也先生不取之近而徵諸逺果何意乎或曰建植木也木挺然上秀旁無附枝郡因是得名溪亦以是名也建溪出自武夷山山有古神仙遺迹溪流縈回山麓佳茗異卉自唐迄宋名人韻士多形之歌詠先生素慕其勝而以之自號也余聞斯言矍然曰吾知先生所以自號矣余南窺五嶺北渡灤陽雖荒徼絶塞山水多佳勝然皆湮塞無聞蓋山水雖勝必因人而勝始著于世也建溪自紫陽夫子講道于其中遂為闕里則建溪乃道學之流派也接濂洛通洙泗淵源脈絡所從來逺矣論河海者必究源委覩河洛者尚思禹功吾黨之士讀紫陽之書遡紫陽之學慕其地想其人安得與則建泛銀漢之槎俯臨九曲之溪招紫陽于渺茫共喚漁郎而倚棹長歌乎士曰唯書之以為序送合流定巖上人遊方序友人余季璋氏訪余蕭洲寓舍言曰吾居于雪溪之南距橙湖六七里而近湖之畔有寺曰合流兩來水環之而過寺因以是名學佛于斯者多博學苦行之士朗上人月庭為巨擘月庭以才名辟天界寺書記在職幾年搢紳莫不敬愛方將奏授大剎以疾還家而卒其大弟子泰定巖能傳朗公之學禪林咸加推重今欲縱遊四方以廣其聞見士友咸賦詩以華其行幸敘其事余惟男子始生以桑弧蓬矢射天地四方則賦逺遊者吾儒之事也定巖儒家子奉父母命而學浮圖法今賦遠遊搢紳大夫士暨叢林之尊宿片言半語皆足以表其所學豈非欲貫儒釋于一家究其同異之所以然乎夫自鴻蒙判鰲極立天地之所以定位日月之所以代明陰陽之所以運行山嶽之所以流峙同此道也同此理也人生其間與天地參其道同也其理同也人同此心心同此理生乎東者不異乎西之人生乎北者不異乎南之人也吾夫子生于華夏其所以教者兼善天下之道釋氏生于竺乾其所以教者獨善其身之道也設教不同皆不外乎是心耳定巖持是説而行四方就有道之正必有發余之所未發者歸而劇談當必有以語我松雲圖為半間禪師序盈天地之間惟萬物然物之可怡悅者亦隨意之所寓非必動心駭目之觀始愜所欲也有道之士雖寓意于物而不留意于物若昔賢之愛蓮是也臨郡半間禪師嘗歷彭蠡泛岷流登姑蘇遊錢塘山川之美都邑之壯宫闕之麗古今名勝遺迹凡接于耳目者咸足廣聞見資禪悅而紛華外物漠然無所動乎中歸至臨江卓錫故山郡邑長吏緇流士庶咸尊其賢屈主慧力禪寺會朝廷設官以掌其教徵拜僧綱置署于天寧寺東偏禪師朝出而治其教事事畢即還慧力燕坐方丈觀松上之雲與造化相周旋常曰松豈吾徒而雲豈吾友也植物之剛而正者莫如松貫四時而長青傲歲寒而獨秀挺然孤高不倚不阿猶吾之卓然自立而常持其堅定之力矣始乎一縷亘乎太虛其來無端其去無迹卷舒隨時變化不測猶吾之心無所住而應變無方也然豈昧于玩物喪志之戒哉亦因物之近似于道者以寓吾因而寄吾興爾天地之物可觀可詠可好可樂者皆在吾心奚獨松與雲乎吾因寓意于斯不留意于斯也禪師世本儒家通內外學余聞斯言而喜其道之合也因次第是語以為之敘送黃立誠逺遊序儒生黃立誠踵門而請曰總角讀禮知桑弧蓬矢所以表男子之所有事竊識之心不忘今年踰弱冠而浮沈里巷無以自見欲及親之康寧遨遊四方以遂其初志吾親既許之矣先生幸賜之言以華其行因語之曰士之志逺遊者非騁吾所欲騖紛華慕聲利將廣其見聞進德修業歸為親榮也為親者孰不望其子之遊卓然有立于世哉所謂詹在側而無離憂親之志不樂也詹出遊而有離憂親之志樂也為人子者以父母之心為心必知所以顯親所以立身矣今子以英妙之年抱有為之志其遊也觀夫名山大川之高深古今人物之高下寓之于目求之于心其進何可量哉過豫章而懷孺子之高風望廬阜而企匡君之遺躅航岷流之浩渺觀萬水之朝宗維揚而看瓊花上蔡而採蓍草神州赤縣之壯黃河太華之雄車書之廣人物之懿皆可悅乎心目而廓見聞也高歌慷慨抒其懷古之思司馬子長之遊不啻過也抑嘗聞孟氏之言而繹之曰尊德樂義遊之本也兼善獨善遊有遇否而道不易也徵諸斯言先立乎其大者逺者則吾子之遊無施而不可奚患乎錦衣歸覲疊拜高堂當舉觴賀子非復吳蒙足以悅親矣立誠曰謹受教遂書以遺之送李克恭序唐西平王李晟有大功德于當時故其子孫蕃衍盛大纍數十世而不替凡氏以李𣲖以西平者皆其後也西平之子憲嘗官于袁遂家焉吉之谷坪李氏則自袁而分也當其盛時文學仕宦赫然為江右之望今雖為清門然猶能守其詩書之業也自谷坪而遷于玉峽之東則克恭之遠祖也克恭幼嗜學有卓立志郡邑聞其能欲辟之為掾克恭曰郡邑事繁而務夥非吾所能也俾佐司征乃就職既逾年沿例得請遂束書言歸其所事之長官咸留之而不能也徵文以華其歸因為之言曰君子之道出與處而已其出也位之崇卑祿之厚薄咸有所不計也親在求榮親而已固非以為身謀也不仕而處乎山林則讀書講學隱遊鄉里富貴利逹恬然不以動心獨善其身而已矣克恭之出而仕也非有貪祿利之心其得請而歸也非有傲世之志皆適其宜而已克恭家世事業備載譜牒兹不復書他日儻經玉峽徑造竹墅相從清泉白石之間當為君賀曰仕宦之樂何如隱居樂也咸曰仁者贈人以言斯言可以贈也遂為之書其二余嘗觀中庸論逹道有曰朋友之交蓋朋友乃人倫之一其關係世道甚重也士生天地間未有不須友以成者友也者友其德也不可以有挾也貴為卿相而下友匹夫固不為詘以至賤之人而上友至貴者自不為僭其所以友者切磋琢磨求以成德不以其富貴而相友也能取友則可以成吾德矣世降俗薄友道不立面朋面友而落穽下石者比比皆是有能敦尚雅道以全朋友之倫固可為世道勸然罕見也士大夫之論交際者曰同寅也僚屬也其次曰座主曰門生曰舉主曰故吏分雖不同而皆有朋友之道焉至于奕葉猶講世契之好不以久而廢也玉峽李克恭世為名家蚤以材能著郡邑咸辟為掾不屑也郡城司征所職上自長官下暨執事者莫不稱其善也近得請還家長官咸惜其去而不忍留也徵文以為贈余惟官若吏雖職任大小有殊然居則同署事則連書是即朋友之道君子上交不諂下交不瀆克恭之事長官可謂盡敬而不諂矣長官之待克恭可謂能盡其禮而不瀆矣上下之交兼盡其美非能全夫朋友之道能如是乎余喜其足為薄俗之勸故不辭而為之序説一如説萬安詩僧純謁余而言曰某儒家子也方總角父母命之學佛今雖服釋氏未始忘乎儒也故名純字一如取中庸語幸繹其義余謂天地以一而成萬化人以一而具萬理一元之氣流行乎兩間陽舒陰慘其變不可知所可知者一理而已人位乎其中唯純乎一則與天地參而其道非聖神不能也通儒釋于一理會萬理于一原因其可名而至于不可名因余之所己言而極于無言一如之道成矣贊曰天地之道皆原于一人亦有之參為三極私勝欲昏如雲蔽日擴而闢之雲散日出皎皎靈臺變化莫測萬理一原罔間儒釋黃氏子字説幼名冠字禮也字而為之説欲其循名思義求以進德也姻友黃氏名實字立誠皆父兄師友命之而求余繹其説余觀其大意言進德修業以忠信立誠為二事之本其用或殊而體無不同師友之名子曰實而字以立誠誠之一字足以包體用貫天人而道之大小皆在其中也子周子曰誠者聖人之本聖人則極天下之至誠而無一毫之不實學者必盡誠之工夫然後可以語此也蓋誠之體無所不包而用之見于外者無所不備小而一言一行大而三綱五常皆有是道也誠之在聖人者不敢妄論今以學者言之處乎家庭行乎州里事父母能竭其孝交友能篤于信至處于夫婦兄弟莫不各盡其道而實理之行乎其中者皆純一而無妄一言之發一事之行皆無一而不實日積月久循循有序誠之之功可以漸而進矣如是而不謂之立誠不可也吾友觀之大易之言參諸中庸之旨誠之道不外是矣書曰知之非艱行之維艱尚其勉之周氏子字説余假館蕭洲之曲郡庠弟子員多從余遊清江周銓其一也銓嘗偕其弟衡謁余而言曰銓昆仲二人祖若父命之名矣尚未之字也幸先生為之字而繹其義余遂字銓曰士選衡曰士權為之説曰銓衡之為言欲銓量人物俾得其平也天之生材必為世用但愚智或殊材有高下代之掌銓衡者必精加甄别而察其孰當孰否其材堪經濟者置之廊廟材堪牧守者擢之方面黼黻皇猷者有之面折廷諍者有之隨其才器大小用之各當其選猶權之稱物輕重各適其用無不宜也虞選于衆而舉臯陶殷選于衆而舉伊尹選之得其道用之盡其材皆持衡之合乎中正而用無所私也虞殷選賢之公不可企及後之掌銓衡者如高孝基裴行儉猶有知人之鑒而銓衡亦合乎權也子之昆仲鋭志于學余以士選士權為之字欲其異時擢高科登顯仕典天官之三銓權衡天下之士俾人材之效用于世者咸稱其選則掌銓持衡之美渢渢乎令譽矣賢昆仲其朂之尚志説為王公玉述君子之學莫先于立志此志一定可以參天地育萬物可以通鬼神移山嶽志之所向莫不如意古之人所求必遂所欲必成皆由此志而充之也會稽王先生篤學尚友恆以古人自期特取孟氏語名其讀書之齋曰尚志徵余為之説余何人也足以知先生之志哉竊聞之先生曰孟氏之所謂尚志仁也義也天下之大四海之廣凡其蒼而生林而處稍有知覺者莫不有斯志也拘以氣稟蔽以物欲能全其志者幾人哉夫修之于身見之于事居家而事親從兄此仁義也見之于親賢愛物亦仁義也曰仁曰義非有至高難行之事患此志不立耳志立于此而仁義在我矣近世大儒論士之志有三曰道德曰功名曰富貴富貴不足言矣志乎道德即仁義也三代而上聖賢代作道德功名混為一途姑即伊尹之事論之佩服于躬而力行之者道德仁義也推之以伐夏救民則功名事業也能志伊尹之志即孟氏之尚志矣三代而下士習庸鄙漫無立志能自樹立者惟孔明耳孔明之志志乎功名者也道德仁義蔑之有聞耳嗟乎時有古今志無古今今之人即古之人也人受天地之中以生莫不有仁義之心有是心即有是志矣不能尚志不知有仁義也今先生能尚志矣曰道德曰功名在力行何如耳余悉以言焉先生曰吾志矣子言然矣請書之置諸座右朝夕觀焉樗隱集卷五
